<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>imgproc</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>imgproc</h1>
    <div class="subtitle">Batches root: <code id="root">…</code></div>
  </header>

  <main>
    <section id="batches-section">
      <div class="section-header">
        <h2>Batches</h2>
        <div class="section-actions">
          <button id="new-batch">+ New batch</button>
          <button id="refresh">Refresh</button>
        </div>
      </div>
      <div id="batches" class="batches-list">
        <div class="empty">Loading…</div>
      </div>
    </section>

    <section id="settings-section">
      <div class="section-header">
        <h2>Settings</h2>
        <div class="section-actions">
          <button id="save-settings">Save</button>
          <button id="reload-settings" class="secondary">Reload</button>
        </div>
      </div>
      <div id="settings" class="settings-grid"></div>
    </section>

    <section id="log-section" hidden>
      <div class="section-header">
        <h2>Last run</h2>
        <div id="job-status" class="job-status"></div>
      </div>
      <pre id="log"></pre>
    </section>
  </main>

  <template id="batch-row-tpl">
    <div class="batch-row">
      <div class="batch-main">
        <div class="batch-name"></div>
        <div class="batch-meta"></div>
      </div>
      <div class="batch-actions">
        <button class="btn-open">Open folder</button>
        <button class="btn-report" hidden>Open report</button>
        <button class="btn-process primary">Process</button>
        <button class="btn-remove danger" title="Delete this batch and all its contents">Remove</button>
      </div>
    </div>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
